defaults:
  - _self_

data:
  arr_dir: /data/arrays
  val_split: 0.1

model:
  win_t: 512
  win_c: 256
  patch_t: 16
  enc_dim: 128
  enc_depth: 4
  enc_heads: 4
  dec_dim: 64
  dec_depth: 2
  dec_heads: 4
  mask_ratio: 0.75
  dropout: 0.0
  var_floor: 0.001
  amplitude_weight: 0.0
  use_cross_channel: true
  k_neighbours: 8
  global_downsample: 32

training:
  epochs: 100
  batch_size: 32
  lr: 1e-3
  weight_decay: 0.05
  num_workers: 4

wandb:
  project: fibermind-das
  name: adif_stageB_crosschannel_v1
